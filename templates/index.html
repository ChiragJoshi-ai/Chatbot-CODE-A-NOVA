<!DOCTYPE html>
<html>
<head>
    <title>Chatbot with Memory</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            text-align: center;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 60%;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        .reply {
            margin-top: 20px;
            background: #222;
            color: #00ff9c;
            padding: 15px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🧠 Chatbot with Memory</h1>

    <form method="POST">
        <input name="username" placeholder="Enter your name" required><br>
        <textarea name="message" placeholder="Type your message..." required></textarea><br>
        <button type="submit">Send</button>
    </form>

    {% if reply %}
    <div class="reply">{{ reply }}</div>
    {% endif %}
</div>

</body>
</html>
